services:
  gazebo:
    build: .
    container_name: gazebo
    network_mode: host
    ipc: host
    environment:
      DISPLAY: ${DISPLAY}
      XAUTHORITY: ${XAUTHORITY:-$HOME/.Xauthority}
      TURTLEBOT3_MODEL: burger
      ROS_DOMAIN_ID: 0
      RMW_IMPLEMENTATION: rmw_cyclonedds_cpp
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${XAUTHORITY:-$HOME/.Xauthority}:/root/.Xauthority:rw
      - ./ws:/ws:rw
    command:
      - bash
      - -lc
      - source /opt/ros/jazzy/setup.bash && ros2 launch turtlebot3_gazebo turtlebot3_world.launch.py

  localization:
    build: .
    container_name: localization
    network_mode: host
    ipc: host
    depends_on:
      - gazebo
    environment:
      DISPLAY: ${DISPLAY}
      XAUTHORITY: ${XAUTHORITY:-$HOME/.Xauthority}
      TURTLEBOT3_MODEL: burger
      ROS_DOMAIN_ID: 0
      RMW_IMPLEMENTATION: rmw_cyclonedds_cpp
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${XAUTHORITY:-$HOME/.Xauthority}:/root/.Xauthority:rw
      - ./ws:/ws:rw
    command:
      - bash
      - -lc
      - source /opt/ros/jazzy/setup.bash && ros2 launch /ws/launch/localization.launch.py map:=/ws/maps/map.yaml init_x:=-2.0 init_y:=-0.5 init_yaw:=0.0

  rviz:
    build: .
    container_name: rviz
    network_mode: host
    ipc: host
    depends_on:
      - localization
    environment:
      DISPLAY: ${DISPLAY}
      XAUTHORITY: ${XAUTHORITY:-$HOME/.Xauthority}
      TURTLEBOT3_MODEL: burger
      ROS_DOMAIN_ID: 0
      RMW_IMPLEMENTATION: rmw_cyclonedds_cpp
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${XAUTHORITY:-$HOME/.Xauthority}:/root/.Xauthority:rw
      - ./ws:/ws:rw
    command:
      - bash
      - -lc
      - source /opt/ros/jazzy/setup.bash && rviz2 -d /ws/config/rviz.rviz --ros-args -p use_sim_time:=true

  teleop:
    build: .
    container_name: teleop
    network_mode: host
    stdin_open: true
    tty: true
    depends_on:
      - gazebo
    environment:
      TURTLEBOT3_MODEL: burger
      ROS_DOMAIN_ID: 0
      RMW_IMPLEMENTATION: rmw_cyclonedds_cpp
    volumes:
      - ./ws:/ws:rw
    command:
      - bash
      - -lc
      - source /opt/ros/jazzy/setup.bash && ros2 run teleop_twist_keyboard teleop_twist_keyboard --ros-args -p stamped:=true -r cmd_vel:=/cmd_vel
