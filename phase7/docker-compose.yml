services:
  # ─────────────────────────────────────────────────────────────────
  # Gazebo シミュレーター (SLAM・ナビゲーション両フェーズ共通)
  # ─────────────────────────────────────────────────────────────────
  gazebo:
    build: .
    container_name: gazebo
    network_mode: host
    ipc: host
    environment:
      DISPLAY: ${DISPLAY}
      XAUTHORITY: /root/.Xauthority
      QT_X11_NO_MITSHM: 1
      TURTLEBOT3_MODEL: burger
      ROS_DOMAIN_ID: 0
      RMW_IMPLEMENTATION: rmw_cyclonedds_cpp
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${XAUTHORITY:-$HOME/.Xauthority}:/root/.Xauthority:ro
      - ./ws:/ws:rw
    command:
      - bash
      - -lc
      - source /opt/ros/jazzy/setup.bash && ros2 launch turtlebot3_gazebo turtlebot3_world.launch.py

  # ─────────────────────────────────────────────────────────────────
  # フェーズ A: SLAM による地図生成
  #   docker compose --profile slam up
  # ─────────────────────────────────────────────────────────────────

  # EKF + slam_toolbox (online_async モード)
  # slam_toolbox が map→odom TF を発行するため AMCL は不要
  slam:
    profiles: [slam]
    build: .
    container_name: slam
    network_mode: host
    ipc: host
    depends_on:
      - gazebo
    environment:
      TURTLEBOT3_MODEL: burger
      ROS_DOMAIN_ID: 0
      RMW_IMPLEMENTATION: rmw_cyclonedds_cpp
    volumes:
      - ./ws:/ws:rw
    command:
      - bash
      - -lc
      # slam.launch.py が EKF(t=5s) → slam_toolbox(t=10s) の順に起動する
      - source /opt/ros/jazzy/setup.bash && ros2 launch /ws/launch/slam.launch.py

  # SLAM 観察用 RViz
  # 地図が徐々に生成される様子を確認する
  rviz_slam:
    profiles: [slam]
    build: .
    container_name: rviz_slam
    network_mode: host
    ipc: host
    depends_on:
      - slam
    environment:
      DISPLAY: ${DISPLAY}
      XAUTHORITY: /root/.Xauthority
      QT_X11_NO_MITSHM: 1
      TURTLEBOT3_MODEL: burger
      ROS_DOMAIN_ID: 0
      RMW_IMPLEMENTATION: rmw_cyclonedds_cpp
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${XAUTHORITY:-$HOME/.Xauthority}:/root/.Xauthority:ro
      - ./ws:/ws:rw
    command:
      - bash
      - -lc
      - source /opt/ros/jazzy/setup.bash && rviz2 -d /ws/config/rviz_slam.rviz --ros-args -p use_sim_time:=true

  # ─────────────────────────────────────────────────────────────────
  # フェーズ B: 保存した地図を使った自律移動 (Nav2)
  #   docker compose --profile nav up
  # ─────────────────────────────────────────────────────────────────

  # EKF + AMCL + map_server (保存済み地図を読み込む)
  localization:
    profiles: [nav]
    build: .
    container_name: localization
    network_mode: host
    ipc: host
    depends_on:
      - gazebo
    environment:
      TURTLEBOT3_MODEL: burger
      ROS_DOMAIN_ID: 0
      RMW_IMPLEMENTATION: rmw_cyclonedds_cpp
    volumes:
      - ./ws:/ws:rw
    command:
      - bash
      - -lc
      # turtlebot3_navigation2 付属のデフォルト地図を使用。
      # init_x/y は turtlebot3_world.launch.py のスポーン位置 (-2.0, -0.5) に合わせる。
      - source /opt/ros/jazzy/setup.bash && ros2 launch /ws/launch/localization.launch.py map:=/ws/maps/map.yaml init_x:=-2.0 init_y:=-0.5 init_yaw:=0.0

  # Nav2 自律移動スタック
  navigation:
    profiles: [nav]
    build: .
    container_name: navigation
    network_mode: host
    ipc: host
    depends_on:
      - localization
    environment:
      TURTLEBOT3_MODEL: burger
      ROS_DOMAIN_ID: 0
      RMW_IMPLEMENTATION: rmw_cyclonedds_cpp
    volumes:
      - ./ws:/ws:rw
    command:
      - bash
      - -lc
      # navigation.launch.py 内の TimerAction で 40 秒待機してから Nav2 起動
      # 理由: localizationコンテナのEKF(t=5s)・AMCL(t=15s)が
      #       TFキャッシュおよびmap->odom TFを確立するのを待つため
      - source /opt/ros/jazzy/setup.bash && ros2 launch /ws/launch/navigation.launch.py

  # ナビゲーション観察用 RViz (コストマップ・経路表示あり)
  rviz_nav:
    profiles: [nav]
    build: .
    container_name: rviz_nav
    network_mode: host
    ipc: host
    depends_on:
      - localization
    environment:
      DISPLAY: ${DISPLAY}
      XAUTHORITY: /root/.Xauthority
      QT_X11_NO_MITSHM: 1
      TURTLEBOT3_MODEL: burger
      ROS_DOMAIN_ID: 0
      RMW_IMPLEMENTATION: rmw_cyclonedds_cpp
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${XAUTHORITY:-$HOME/.Xauthority}:/root/.Xauthority:ro
      - ./ws:/ws:rw
    command:
      - bash
      - -lc
      - source /opt/ros/jazzy/setup.bash && rviz2 -d /ws/config/rviz.rviz --ros-args -p use_sim_time:=true

  # ─────────────────────────────────────────────────────────────────
  # Phase 6: REST API ブリッジ (外部システムからロボットを HTTP で操作)
  #   docker compose --profile nav up
  #   起動後: curl -X POST http://localhost:8000/move_to \
  #             -H "Content-Type: application/json" \
  #             -d '{"x": 1.0, "y": 2.0, "yaw": 0.0}'
  # ─────────────────────────────────────────────────────────────────
  api_bridge:
    profiles: [nav]
    build: .
    container_name: api_bridge
    # network_mode: host により、ポート 8000 はホストに直接公開される。
    # (network_mode: host 使用時は ports 指定は無効だが、同等の効果)
    network_mode: host
    ipc: host
    depends_on:
      - navigation
    environment:
      TURTLEBOT3_MODEL: burger
      ROS_DOMAIN_ID: 0
      RMW_IMPLEMENTATION: rmw_cyclonedds_cpp
    volumes:
      - ./ws:/ws:rw
    command:
      - bash
      - -lc
      # use_sim_time:=true: Nav2 がシミュレーション時刻を使うため、
      # ゴール Pose のタイムスタンプも同じ時計で発行する必要がある
      - source /opt/ros/jazzy/setup.bash && python3 /ws/scripts/web_bridge_node.py --ros-args -p use_sim_time:=true

  # ─────────────────────────────────────────────────────────────────
  # Open-RMF EasyFullControl Fleet Adapter
  #
  # RMF Core (rmf_traffic_ros2 / rmf_task_ros2) と api_bridge を仲介する。
  # RMF からの navigation task を受け取り POST /move_to に変換する。
  # /amcl_pose をサブスクライブしてロボット位置を RMF に通知する。
  #
  # 起動: docker compose --profile nav --profile rmf up
  # または既存 nav スタックに合わせてプロファイルを追加する場合:
  #   docker compose --profile nav up
  #   (rmf_adapter を nav profile に含める場合は profiles: [nav] に変更可)
  # ─────────────────────────────────────────────────────────────────
  rmf_adapter:
    profiles: [rmf]
    build:
      context: .
      dockerfile: rmf_adapter/Dockerfile
    container_name: rmf_adapter
    # network_mode: host を選択した理由:
    #   1. 既存コンテナ (api_bridge, localization 等) が全て host モードのため、
    #      CycloneDDS の DDS 通信 (/amcl_pose 等) を同一 network_mode で統一する
    #   2. api_bridge の REST endpoint (localhost:8000) に直接アクセスできる
    #   3. bridge ネットワーク使用時は DDS マルチキャストが複雑になるため避ける
    network_mode: host
    ipc: host
    depends_on:
      - api_bridge
    environment:
      TURTLEBOT3_MODEL: burger
      ROS_DOMAIN_ID: 0
      RMW_IMPLEMENTATION: rmw_cyclonedds_cpp
    volumes:
      # スクリプトをコンテナ内 /rmf_adapter にマウント (開発時の即反映)
      - ./rmf_adapter:/rmf_adapter:ro
    command:
      - bash
      - -lc
      - |
        source /opt/ros/jazzy/setup.bash
        cd /rmf_adapter
        python3 fleet_adapter.py \
          --config /rmf_adapter/config/fleet_config.yaml \
          --nav-graph /rmf_adapter/config/nav_graph.yaml

  # ─────────────────────────────────────────────────────────────────
  # テレオペ (SLAM フェーズで手動操作するために使用)
  #   docker compose run --rm teleop
  # Nav2 ナビゲーション中は cmd_vel が競合するため使用しない
  # ─────────────────────────────────────────────────────────────────
  teleop:
    build: .
    container_name: teleop
    network_mode: host
    stdin_open: true
    tty: true
    profiles:
      - debug
    depends_on:
      - gazebo
    environment:
      TURTLEBOT3_MODEL: burger
      ROS_DOMAIN_ID: 0
      RMW_IMPLEMENTATION: rmw_cyclonedds_cpp
    volumes:
      - ./ws:/ws:rw
    command:
      - bash
      - -lc
      - source /opt/ros/jazzy/setup.bash && ros2 run teleop_twist_keyboard teleop_twist_keyboard --ros-args -p stamped:=true -r cmd_vel:=/cmd_vel
