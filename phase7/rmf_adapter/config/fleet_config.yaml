# fleet_config.yaml
#
# TurtleBot3 burger (Gazebo, ROS2 Jazzy, Phase 7) 用 RMF fleet adapter 設定
#
# map 座標系: SLAM で生成した地図 (origin=[-10,-10], resolution=0.05m/px)
# Gazebo world 座標系と一致 (SLAM 時に slam_toolbox がワールド原点で開始するため)

# ─── fleet / robot 識別子 ───────────────────────────────────────────────────
fleet_name: turtlebot3_fleet   # RMF 上で fleet として登録される名前
robot_name: turtlebot3         # fleet 内の robot 名

# RMF nav graph のレベル名 (単一フロア環境なので "L1")
map_name: L1

# ─── ロボット形状プロファイル ────────────────────────────────────────────────
profile:
  # TurtleBot3 burger の外形半径 [m]
  # 実機: 幅 0.138m → 半径 0.138/2 ≈ 0.069m
  # コストマップの robot_radius=0.22 に合わせて少し大きめに設定
  footprint: 0.18
  # vicinity: RMF の経路可視判定に使う, footprint より広く取る
  vicinity: 0.35

# ─── 速度・加速度制限 (TurtleBot3 burger spec) ──────────────────────────────
limits:
  linear:
    velocity:     0.22   # max 0.22 m/s
    acceleration: 0.50   # m/s²
  angular:
    velocity:     1.00   # max 1.0 rad/s
    acceleration: 2.00   # rad/s²

# ─── バッテリーシステム (最小ダミー設定) ─────────────────────────────────────
# account_for_battery_drain=false のため実測は不要。
# ただし BatterySystem オブジェクト生成に最低限の値が必要。
battery_system:
  nominal_voltage:  12.0   # [V]
  nominal_capacity:  2.5   # [Ah]
  charging_current:  0.5   # [A]

# ─── api_bridge REST エンドポイント ─────────────────────────────────────────
# network_mode: host のため localhost で到達可能
api:
  base_url: http://localhost:8000
  timeout:  5.0   # [秒]

# ─── ナビゲーション設定 ──────────────────────────────────────────────────────
# 到達判定閾値: /amcl_pose と goal の距離がこれ以下になったら "到着" と判断
arrival_threshold: 0.35   # [m]

# ─── 初期 waypoint ────────────────────────────────────────────────────────────
# nav_graph.yaml の waypoint 名で指定
# AMCL の init_x=-2.0, init_y=-0.5 と一致する waypoint
initial_waypoint:  start
charger_waypoint:  start
